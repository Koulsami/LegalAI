# E2 — Falsity or Misleadingness
# Layer: ELEMENTS
# Prerequisite: E1 (representation was made)

id: E2
name: Falsity or Misleadingness
layer: ELEMENTS
prerequisites:
  - E1

required_facts:
  - representations[*].truth_value
  - representations[*].evidence_of_falsity

predicate: >
  The representation is false or misleading. truth_value
  must be FALSE or PARTIALLY_FALSE with supporting
  evidence of falsity. truth_value = UNKNOWN causes
  this node to ABSTAIN — the engine cannot establish
  falsity without positive evidence, though a party
  may assert the unknown in their favour. Applies also
  to statements misleading by omission where a duty to
  correct exists — omission cases are flagged for human
  review but not decided by the engine.

conclusion: >
  Falsity or misleadingness of the representation is
  established. The statement does not reflect the true
  state of affairs at the time it was made.

burden: CLAIMANT
modality: MUST
protected: false

abstention_policy: STRICT

citations:
  - "Misrepresentation Act 1967 (2020 Rev Ed) (Cap 390) s.2"
  - "Panatron Pte Ltd v Lee Cheow Lee [2001] 2 SLR(R) 435 (SGCA) at [14] — element (a) false representation of fact"
  - "Common Law — falsity requirement"

notes: >
  DRAFT — approved Q1 + Q2 (Aashna, 2025).
  truth_value = UNKNOWN → ABSTAINED. Engine surfaces
  flag: "Truth status unknown — cannot establish
  falsity. A party may assert this in their favour
  but the engine cannot determine it."
  Misleading by omission: flagged-but-not-decided for
  MVP. Engine notes if extraction_notes reference
  omission or failure to disclose, but does not resolve
  the element. No duty_to_correct fact slot required
  for MVP.
