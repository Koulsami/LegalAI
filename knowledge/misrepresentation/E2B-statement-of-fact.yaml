# E2B — Statement of Existing Fact
# Layer: ELEMENTS
# Prerequisite: E1 (representation was made)

id: E2B
name: Statement of Existing Fact
layer: ELEMENTS
prerequisites:
  - E1

required_facts:
  - representations[*].statement

predicate: >
  The representation is a statement of existing fact,
  not a statement of opinion, future intention, law,
  or mere commercial puff. A statement of fact is one
  that is verifiable as true or false at the time it
  is made.

conclusion: >
  The representation is a statement of fact capable of
  founding a misrepresentation claim. Statements of
  opinion, future intention, or puff do not satisfy
  this element.

burden: CLAIMANT
modality: MUST
protected: false

abstention_policy: STRICT

citations:
  - "Common Law — distinction between fact and opinion"
  - "Bisset v Wilkinson [1927] AC 177 (PC) — opinion not actionable unless maker had special knowledge"
  - "Panatron Pte Ltd v Lee Cheow Lee [2001] 2 SLR(R) 435 (SGCA) at [14] — element (a) false representation of fact"
  - "Smith v Land & House Property Corp (1884) 28 ChD 7 (CA) — expert opinion may constitute statement of fact where maker has special knowledge"

notes: >
  DRAFT — approved Q3 + Q4 (Aashna, 2025).
  STRICT abstention — if statement type is ambiguous
  or cannot be determined from the documents, the
  engine ABSTAINs and surfaces the question to the
  user. Classification does not proceed on an
  unresolved statement-type question.
  Special knowledge exception (Smith v Land & House):
  an opinion by a party with expertise in the subject
  matter may be treated as a statement of fact.
